<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Driver Earnings Tracker</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

:root{
--bg:#121212;
--card:#1e1e1e;
--border:#333;
--text:#f1f1f1;
--accent:#4f9cff;
--green:#22c55e;
--red:#ef4444;
--cash:#16a34a;
--cardblue:#2563eb;
}

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto;
background:var(--bg);
color:var(--text);
padding:18px;
}

.container{
max-width:520px;
margin:auto;
}

.card{
background:var(--card);
border-radius:16px;
padding:18px;
margin-bottom:16px;
border:1px solid var(--border);
}

h1{
margin-top:0;
font-size:22px;
}

.stat{
display:flex;
justify-content:space-between;
margin:6px 0;
}

.total{
font-size:20px;
font-weight:bold;
margin-top:10px;
}

input,select{
width:100%;
padding:12px;
border-radius:10px;
border:1px solid var(--border);
margin-top:6px;
background:#111;
color:white;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:12px;
margin-top:10px;
background:linear-gradient(45deg,#4f9cff,#3b82f6);
color:white;
font-weight:bold;
font-size:16px;
}

.delivery{
border-bottom:1px solid var(--border);
padding:10px 0;
display:flex;
justify-content:space-between;
align-items:center;
}

.badge{
padding:3px 8px;
border-radius:6px;
font-size:12px;
font-weight:bold;
}

.cash{
background:var(--cash);
}

.cardbadge{
background:var(--cardblue);
}

.historyButtons button{
width:auto;
padding:6px 10px;
margin-left:6px;
}

.pagination{
display:flex;
justify-content:center;
align-items:center;
margin-top:10px;
gap:10px;
}

.pagebtn{
width:auto;
padding:8px 12px;
}

.gasInput{
width:80px;
}

.profitGreen{color:var(--green);font-weight:bold;}
.profitRed{color:var(--red);font-weight:bold;}

</style>
</head>

<body>

<div class="container">

<div class="card">

<h1>Driver Dashboard</h1>

<div class="stat"><span>Deliveries</span><span id="deliveries">0</span></div>

<div class="stat"><span>Card Earnings</span><span>$<span id="cardTotal">0</span></span></div>

<div class="stat"><span>Cash Earnings</span><span>$<span id="cashTotal">0</span></span></div>

<div class="stat"><span>Tips</span><span>$<span id="tipsTotal">0</span></span></div>

<div class="stat"><span>Company Payout</span><span>$<span id="companyPayout">0</span></span></div>

<div class="stat"><span>Gas</span><span>$ <input id="gas" class="gasInput" type="number" value="0"></span></div>

<div class="stat"><span>Profit After Gas</span><span>$<span id="profit">0</span></span></div>

<div class="total">Total Earnings: $<span id="grandTotal">0</span></div>

</div>


<div class="card">

<label>Date</label>
<input id="date" type="date">

<label>Delivery Type</label>

<select id="type">
<option value="card">Card Delivery</option>
<option value="cash">Cash Delivery</option>
</select>

<label>Delivery Fee</label>
<input id="deliveryFee" type="number">

<label>Tip</label>
<input id="tip" type="number">

<label>Service Fee (cash only)</label>
<input id="serviceFee" type="number">

<button onclick="addDelivery()">Add Delivery</button>

</div>


<div class="card">

<h3>Earnings Chart</h3>
<canvas id="chart"></canvas>

</div>


<div class="card">

<h3>Delivery History</h3>

<div id="history"></div>

<div class="pagination">

<button class="pagebtn" onclick="prevPage()">⬅</button>

<span id="pageInfo"></span>

<button class="pagebtn" onclick="nextPage()">➡</button>

</div>

<button onclick="exportCSV()">Export Excel File</button>

</div>

</div>


<script>

let deliveries = JSON.parse(localStorage.getItem("deliveries")) || []

let currentPage = 1
const perPage = 10

document.getElementById("date").valueAsDate = new Date()

function save(){

localStorage.setItem("deliveries",JSON.stringify(deliveries))

}

function addDelivery(){

let date=document.getElementById("date").value

let type=document.getElementById("type").value

let fee=parseFloat(document.getElementById("deliveryFee").value)||0

let tip=parseFloat(document.getElementById("tip").value)||0

let service=parseFloat(document.getElementById("serviceFee").value)||0

let companyCut=fee*0.20

let earning=(fee-companyCut)+tip

if(type==="cash"){
earning-=service
}

deliveries.unshift({date,type,fee,tip,service,earning})

save()

render()

}

function deleteDelivery(i){

deliveries.splice(i,1)

save()

render()

}

function editDelivery(i){

let d=deliveries[i]

let newDate=prompt("Edit Date",d.date)

let newFee=prompt("Edit Delivery Fee",d.fee)

let newTip=prompt("Edit Tip",d.tip)

let newService=prompt("Edit Service Fee",d.service)

if(newDate!==null){

d.date=newDate

d.fee=parseFloat(newFee)||0

d.tip=parseFloat(newTip)||0

d.service=parseFloat(newService)||0

let companyCut=d.fee*0.20

d.earning=(d.fee-companyCut)+d.tip

if(d.type==="cash"){
d.earning-=d.service
}

save()

render()

}

}

function render(){

let start=(currentPage-1)*perPage

let end=start+perPage

let pageDeliveries=deliveries.slice(start,end)

let history=document.getElementById("history")

history.innerHTML=""

let cardTotal=0

let cashTotal=0

let tipsTotal=0

let serviceTotal=0

let daily={}

pageDeliveries.forEach((d,i)=>{

let realIndex=start+i

let badge=d.type==="cash"?"cash":"cardbadge"

let label=d.type==="cash"?"CASH":"CARD"

history.innerHTML+=`

<div class="delivery">

<div>

<span class="badge ${badge}">${label}</span>

<strong>$${d.earning.toFixed(2)}</strong>

<br>

<small>${d.date}</small>

</div>

<div class="historyButtons">

<button onclick="editDelivery(${realIndex})">Edit</button>

<button onclick="deleteDelivery(${realIndex})">Delete</button>

</div>

</div>

`

})

deliveries.forEach(d=>{

if(d.type==="card"){

cardTotal+=d.earning

}else{

cashTotal+=d.earning

serviceTotal+=d.service

}

tipsTotal+=d.tip

if(!daily[d.date]) daily[d.date]=0

daily[d.date]+=d.earning

})

let companyPayout=cardTotal-serviceTotal

let grand=cardTotal+cashTotal

let gas=parseFloat(document.getElementById("gas").value)||0

let profit=grand-gas

document.getElementById("deliveries").innerText=deliveries.length

document.getElementById("cardTotal").innerText=cardTotal.toFixed(2)

document.getElementById("cashTotal").innerText=cashTotal.toFixed(2)

document.getElementById("tipsTotal").innerText=tipsTotal.toFixed(2)

document.getElementById("companyPayout").innerText=companyPayout.toFixed(2)

document.getElementById("grandTotal").innerText=grand.toFixed(2)

let profitEl=document.getElementById("profit")

profitEl.innerText=profit.toFixed(2)

profitEl.className=profit>=0?"profitGreen":"profitRed"

drawChart(daily)

let totalPages=Math.ceil(deliveries.length/perPage)

document.getElementById("pageInfo").innerText=`Page ${currentPage} / ${totalPages||1}`

}

function nextPage(){

let totalPages=Math.ceil(deliveries.length/perPage)

if(currentPage<totalPages){

currentPage++

render()

}

}

function prevPage(){

if(currentPage>1){

currentPage--

render()

}

}

let chart

function drawChart(data){

let labels=Object.keys(data)

let values=Object.values(data)

if(chart) chart.destroy()

chart=new Chart(document.getElementById("chart"),{

type:"bar",

data:{

labels:labels,

datasets:[{

label:"Daily Earnings",

data:values

}]

}

})

}

function exportCSV(){

let csv="Date,Type,Delivery Fee,Tip,Service Fee,Earnings\n"

deliveries.forEach(d=>{

csv+=`${d.date},${d.type},${d.fee},${d.tip},${d.service},${d.earning}\n`

})

let blob=new Blob([csv],{type:"text/csv"})

let url=URL.createObjectURL(blob)

let a=document.createElement("a")

a.href=url

a.download="deliveries.csv"

a.click()

}

document.getElementById("gas").addEventListener("input",render)

render()

</script>

</body>
</html>
