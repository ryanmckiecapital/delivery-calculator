<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Driver Earnings Tracker</title>

<style>

:root{
--bg:#121212;
--card:#1e1e1e;
--border:#2a2a2a;
--text:#f2f2f2;
--green:#22c55e;
--red:#ef4444;
--cash:#16a34a;
--cardblue:#2563eb;
}

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto;
background:var(--bg);
color:var(--text);
padding:16px;
}

.container{
max-width:520px;
margin:auto;
display:flex;
flex-direction:column;
gap:16px;
}

.card{
background:var(--card);
border-radius:16px;
padding:18px;
border:1px solid var(--border);
width:100%;
box-sizing:border-box;
overflow:hidden;
}

h1,h3{
margin-top:0;
}

.stat{
display:flex;
justify-content:space-between;
margin:6px 0;
}

.total{
font-size:20px;
font-weight:bold;
margin-top:10px;
}

label{
display:block;
margin-top:10px;
}

input,select{
display:block;
width:100%;
max-width:100%;
padding:12px;
border-radius:10px;
border:1px solid var(--border);
margin-top:6px;
background:#111;
color:white;
box-sizing:border-box;
font-size:16px;
}

input[type="date"]{
width:100%;
max-width:100%;
display:block;
box-sizing:border-box;
-webkit-appearance:none;
appearance:none;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:12px;
margin-top:12px;
background:linear-gradient(45deg,#4f9cff,#2563eb);
color:white;
font-weight:bold;
font-size:16px;
}

.dashboard{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-bottom:10px;
}

.dashboard div{
background:#111;
padding:10px;
border-radius:10px;
text-align:center;
}

.delivery{
position:relative;
border-bottom:1px solid var(--border);
overflow:hidden;
}

.deliveryContent{
padding:14px;
background:var(--card);
display:flex;
justify-content:space-between;
align-items:center;
transition:transform .25s;
}

.deleteBtn{
position:absolute;
right:0;
top:0;
bottom:0;
width:80px;
background:var(--red);
color:white;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
}

.badge{
padding:4px 8px;
border-radius:6px;
font-size:11px;
font-weight:bold;
}

.cash{background:var(--cash)}
.cardbadge{background:var(--cardblue)}

.pagination{
display:flex;
justify-content:center;
gap:10px;
margin-top:10px;
}

.pagebtn{
width:auto;
padding:6px 10px;
}

.profitGreen{color:var(--green);font-weight:bold;}
.profitRed{color:var(--red);font-weight:bold;}

.tools{
display:flex;
gap:10px;
margin-top:10px;
}

.tools button{
flex:1;
}

</style>
</head>

<body>

<div class="container">

<div class="card">

<h1>Driver Dashboard</h1>

<div class="dashboard">

<div>Today<br><strong id="today">0</strong></div>
<div>This Week<br><strong id="week">0</strong></div>
<div>Company Payout<br><strong id="companyPayout">0</strong></div>
<div>Deliveries<br><strong id="deliveries">0</strong></div>

</div>

<div class="stat"><span>Card Earnings</span><span>$<span id="cardTotal">0</span></span></div>
<div class="stat"><span>Cash Earnings</span><span>$<span id="cashTotal">0</span></span></div>
<div class="stat"><span>Tips</span><span>$<span id="tipsTotal">0</span></span></div>

<div class="stat">
<span>Gas</span>
<span>$ <input id="gas" type="number" value="0"></span>
</div>

<div class="stat"><span>Profit After Gas</span><span>$<span id="profit">0</span></span></div>

<div class="total">Total Earnings: $<span id="grandTotal">0</span></div>

</div>


<div class="card">

<h3>Company Pay Period</h3>

<div class="stat"><span>1–15 Payout</span><span>$<span id="pay1">0</span></span></div>
<div class="stat"><span>16–End Payout</span><span>$<span id="pay2">0</span></span></div>

</div>


<div class="card">

<label>Date</label>
<input id="date" type="date">

<label>Delivery Type</label>
<select id="type">
<option value="card">Card Delivery</option>
<option value="cash">Cash Delivery</option>
</select>

<label>Delivery Fee</label>
<input id="deliveryFee" type="number">

<label>Tip</label>
<input id="tip" type="number">

<label>Service Fee</label>
<input id="serviceFee" type="number">

<button onclick="addDelivery()">Add Delivery</button>

</div>


<div class="card">

<h3>Delivery History</h3>

<div id="history"></div>

<div class="pagination">

<button class="pagebtn" onclick="prevPage()">⬅</button>
<span id="pageInfo"></span>
<button class="pagebtn" onclick="nextPage()">➡</button>

</div>

</div>


<div class="card">

<h3>Backup</h3>

<div class="tools">

<button onclick="exportData()">Export</button>

<button onclick="document.getElementById('importFile').click()">Import</button>

<input id="importFile" type="file" style="display:none" onchange="importData(event)">

</div>

</div>

</div>

<script>

let deliveries=[]
let db
let currentPage=1
const perPage=10

let startX=0

let request=indexedDB.open("driverDB",1)

request.onupgradeneeded=e=>{
db=e.target.result
db.createObjectStore("deliveries",{keyPath:"id",autoIncrement:true})
}

request.onsuccess=e=>{
db=e.target.result
loadData()
}

function loadData(){

let tx=db.transaction("deliveries","readonly")
let store=tx.objectStore("deliveries")

store.getAll().onsuccess=e=>{
deliveries=e.target.result
render()
}

}

function saveDelivery(data){

let tx=db.transaction("deliveries","readwrite")
tx.objectStore("deliveries").add(data)
tx.oncomplete=loadData

}

function addDelivery(){

let date=document.getElementById("date").value
let type=document.getElementById("type").value
let fee=parseFloat(document.getElementById("deliveryFee").value)||0
let tip=parseFloat(document.getElementById("tip").value)||0
let service=parseFloat(document.getElementById("serviceFee").value)||0

let companyCut=fee*0.20
let earning=(fee-companyCut)+tip

if(type==="cash") earning-=service

saveDelivery({date,type,fee,tip,service,earning})

document.getElementById("deliveryFee").value=""
document.getElementById("tip").value=""
document.getElementById("serviceFee").value=""

document.getElementById("deliveryFee").focus()

}

function deleteDelivery(id){

let tx=db.transaction("deliveries","readwrite")
tx.objectStore("deliveries").delete(id)
tx.oncomplete=loadData

}

function exportData(){

let blob=new Blob([JSON.stringify(deliveries)],{type:"application/json"})
let url=URL.createObjectURL(blob)

let a=document.createElement("a")
a.href=url
a.download="driver_backup.json"
a.click()

}

function importData(event){

let file=event.target.files[0]

let reader=new FileReader()

reader.onload=function(e){

let imported=JSON.parse(e.target.result)

let tx=db.transaction("deliveries","readwrite")
let store=tx.objectStore("deliveries")

imported.forEach(d=>store.add(d))

tx.oncomplete=loadData

}

reader.readAsText(file)

}

function render(){

let start=(currentPage-1)*perPage
let page=deliveries.slice(start,start+perPage)

let history=document.getElementById("history")
history.innerHTML=""

let cardTotal=0
let cashTotal=0
let tipsTotal=0
let serviceTotal=0

let pay1=0
let pay2=0

page.forEach(d=>{

let badge=d.type==="cash"?"cash":"cardbadge"
let label=d.type==="cash"?"CASH":"CARD"

history.innerHTML+=`

<div class="delivery">

<div class="deleteBtn" onclick="deleteDelivery(${d.id})">Delete</div>

<div class="deliveryContent"
ontouchstart="startSwipe(event)"
ontouchmove="moveSwipe(event)">

<div>

<span class="badge ${badge}">${label}</span>
<strong>$${d.earning.toFixed(2)}</strong>
<br>
<small>${d.date}</small>

</div>

</div>

</div>

`

})

deliveries.forEach(d=>{

if(d.type==="card"){

cardTotal+=d.earning

let day=new Date(d.date).getDate()

if(day<=15) pay1+=d.earning
else pay2+=d.earning

}else{

cashTotal+=d.earning
serviceTotal+=d.service

}

tipsTotal+=d.tip

})

let companyPayout=cardTotal-serviceTotal
let grand=cardTotal+cashTotal
let gas=parseFloat(document.getElementById("gas").value)||0
let profit=grand-gas

document.getElementById("cardTotal").innerText=cardTotal.toFixed(2)
document.getElementById("cashTotal").innerText=cashTotal.toFixed(2)
document.getElementById("tipsTotal").innerText=tipsTotal.toFixed(2)
document.getElementById("grandTotal").innerText=grand.toFixed(2)

document.getElementById("deliveries").innerText=deliveries.length
document.getElementById("companyPayout").innerText=companyPayout.toFixed(2)

document.getElementById("pay1").innerText=pay1.toFixed(2)
document.getElementById("pay2").innerText=pay2.toFixed(2)

let profitEl=document.getElementById("profit")

profitEl.innerText=profit.toFixed(2)
profitEl.className=profit>=0?"profitGreen":"profitRed"

let pages=Math.ceil(deliveries.length/perPage)||1
document.getElementById("pageInfo").innerText=`Page ${currentPage}/${pages}`

}

function nextPage(){
let pages=Math.ceil(deliveries.length/perPage)
if(currentPage<pages){
currentPage++
render()
}
}

function prevPage(){
if(currentPage>1){
currentPage--
render()
}
}

function startSwipe(e){
startX=e.touches[0].clientX
}

function moveSwipe(e){

let diff=startX-e.touches[0].clientX

if(diff>30){
e.currentTarget.style.transform="translateX(-80px)"
}

}

document.getElementById("gas").addEventListener("input",render)

</script>

</body>
</html>
