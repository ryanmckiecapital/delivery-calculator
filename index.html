<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Driver Earnings Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

:root{
--bg:#f2f2f2;
--card:#ffffff;
--text:#222;
--accent:#3b82f6;
--border:#e5e5e5;
--profit:#22c55e;
--loss:#ef4444;
}

@media (prefers-color-scheme: dark){
:root{
--bg:#121212;
--card:#1e1e1e;
--text:#f5f5f5;
--accent:#4f9cff;
--border:#333;
}
}

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto;
background:var(--bg);
color:var(--text);
padding:18px;
}

.container{
max-width:520px;
margin:auto;
}

.card{
background:var(--card);
border-radius:14px;
padding:18px;
margin-bottom:16px;
border:1px solid var(--border);
box-shadow:0 6px 14px rgba(0,0,0,0.08);
}

h1{margin-top:0;font-size:22px}

.stat{
display:flex;
justify-content:space-between;
margin:6px 0;
align-items:center;
}

.total{
font-weight:bold;
font-size:20px;
margin-top:10px;
}

label{font-size:13px;opacity:.7}

input,select{
width:100%;
padding:12px;
margin-top:4px;
border-radius:8px;
border:1px solid var(--border);
font-size:16px;
background:var(--card);
color:var(--text);
box-sizing:border-box;
}

button{
width:100%;
margin-top:12px;
padding:14px;
font-size:16px;
border:none;
border-radius:10px;
background:var(--accent);
color:white;
font-weight:600;
}

.delivery{
padding:10px;
border-bottom:1px solid var(--border);
display:flex;
justify-content:space-between;
}

.small{font-size:12px;opacity:.7}

.delete{
background:#ef4444;
color:white;
border:none;
border-radius:6px;
padding:6px 10px;
font-size:12px;
}

.gasInput{
width:90px;
padding:6px;
border-radius:6px;
border:1px solid var(--border);
}

.profitGreen{color:var(--profit);font-weight:bold}
.profitRed{color:var(--loss);font-weight:bold}

.summary{
font-size:18px;
font-weight:bold;
margin-top:8px;
}

</style>
</head>

<body>

<div class="container">

<div class="card">

<h1 id="period"></h1>

<div class="stat"><span>Deliveries</span><span id="deliveries">0</span></div>
<div class="stat"><span>Card Earnings</span><span>$<span id="cardTotal">0</span></span></div>
<div class="stat"><span>Cash Earnings</span><span>$<span id="cashTotal">0</span></span></div>
<div class="stat"><span>Tips</span><span>$<span id="tipsTotal">0</span></span></div>

<div class="stat"><span>Company Payout (Card)</span><span>$<span id="cardPayout">0</span></span></div>
<div class="stat"><span>Cash Owed Company</span><span>$<span id="cashOwed">0</span></span></div>

<div class="stat">
<span>Gas Expense</span>
<span>$ <input id="gas" class="gasInput" type="number" value="0"></span>
</div>

<div class="stat">
<span>Profit After Gas</span>
<span>$<span id="profit">0</span></span>
</div>

<div class="total">Total Earnings: $<span id="grandTotal">0</span></div>

</div>

<div class="card">

<h3>Expected Payday Deposit</h3>

<div class="stat">
<span>15th Payday</span>
<span>$<span id="pay15">0</span></span>
</div>

<div class="stat">
<span>End of Month Payday</span>
<span>$<span id="payEnd">0</span></span>
</div>

</div>

<div class="card">

<h3>Weekly Earnings</h3>

<div class="summary">
This Week: $<span id="weekTotal">0</span>
</div>

</div>

<div class="card">

<label>Date</label>
<input id="date" type="text">

<label>Delivery Type</label>
<select id="type">
<option value="card">Card Delivery</option>
<option value="cash">Cash Delivery</option>
</select>

<label>Delivery Fee</label>
<input id="deliveryFee" type="number">

<label>Tip</label>
<input id="tip" type="number">

<label>Service Fee (cash only)</label>
<input id="serviceFee" type="number">

<button onclick="addDelivery()">Add Delivery</button>

</div>

<div class="card">

<h3>Earnings Chart</h3>
<canvas id="chart"></canvas>

</div>

<div class="card">

<h3>Delivery History</h3>
<div id="history"></div>

<button onclick="exportCSV()">Export Excel File</button>

</div>

</div>

<script>

let deliveries = JSON.parse(localStorage.getItem("deliveries")) || []

function today(){
let d=new Date()
return d.toLocaleDateString("en-US",{year:"numeric",month:"short",day:"numeric"})
}

document.getElementById("date").value=today()

function payPeriod(){
let day=new Date().getDate()
return day<=15 ? "Pay Period: 1st - 15th" : "Pay Period: 16th - End"
}

document.getElementById("period").innerText=payPeriod()

function save(){
localStorage.setItem("deliveries",JSON.stringify(deliveries))
}

function addDelivery(){

let date=document.getElementById("date").value
let type=document.getElementById("type").value
let fee=parseFloat(document.getElementById("deliveryFee").value)||0
let tip=parseFloat(document.getElementById("tip").value)||0
let service=parseFloat(document.getElementById("serviceFee").value)||0

let companyCut=fee*0.20
let earning=(fee-companyCut)+tip

if(type==="cash"){
earning-=service
}

deliveries.push({date,type,fee,tip,service,earning})

save()
render()

}

function deleteDelivery(i){
deliveries.splice(i,1)
save()
render()
}

let chart

function render(){

let history=document.getElementById("history")

let cardTotal=0
let cashTotal=0
let tipsTotal=0
let cashOwed=0

let weekTotal=0

let pay15=0
let payEnd=0

let daily={}

history.innerHTML=""

deliveries.forEach((d,i)=>{

let dateObj=new Date(d.date)

if(d.type==="card"){
cardTotal+=d.earning

if(dateObj.getDate()<=15){
pay15+=d.earning
}else{
payEnd+=d.earning
}

}else{
cashTotal+=d.earning
cashOwed+=d.service
}

tipsTotal+=d.tip

let today=new Date()
let weekAgo=new Date()
weekAgo.setDate(today.getDate()-7)

if(dateObj>=weekAgo){
weekTotal+=d.earning
}

if(!daily[d.date]) daily[d.date]=0
daily[d.date]+=d.earning

history.innerHTML+=`
<div class="delivery">
<div>
<strong>${d.type.toUpperCase()}</strong> - $${d.earning.toFixed(2)}<br>
<span class="small">${d.date}</span>
</div>
<button class="delete" onclick="deleteDelivery(${i})">Delete</button>
</div>
`

})

let grand=cardTotal+cashTotal
let gas=parseFloat(document.getElementById("gas").value)||0
let profit=grand-gas

document.getElementById("deliveries").innerText=deliveries.length
document.getElementById("cardTotal").innerText=cardTotal.toFixed(2)
document.getElementById("cashTotal").innerText=cashTotal.toFixed(2)
document.getElementById("tipsTotal").innerText=tipsTotal.toFixed(2)

document.getElementById("cardPayout").innerText=cardTotal.toFixed(2)
document.getElementById("cashOwed").innerText=cashOwed.toFixed(2)

document.getElementById("grandTotal").innerText=grand.toFixed(2)

document.getElementById("weekTotal").innerText=weekTotal.toFixed(2)

document.getElementById("pay15").innerText=pay15.toFixed(2)
document.getElementById("payEnd").innerText=payEnd.toFixed(2)

let profitEl=document.getElementById("profit")

profitEl.innerText=profit.toFixed(2)

profitEl.classList.remove("profitGreen","profitRed")

profit>=0 ? profitEl.classList.add("profitGreen") : profitEl.classList.add("profitRed")

drawChart(daily)

}

function drawChart(data){

let labels=Object.keys(data)
let values=Object.values(data)

if(chart) chart.destroy()

chart=new Chart(document.getElementById("chart"),{
type:"bar",
data:{
labels:labels,
datasets:[{
label:"Daily Earnings",
data:values
}]
}
})

}

function exportCSV(){

let csv="Date,Type,Delivery Fee,Tip,Service Fee,Earnings\n"

deliveries.forEach(d=>{
csv+=`${d.date},${d.type},${d.fee},${d.tip},${d.service},${d.earning}\n`
})

let blob=new Blob([csv],{type:"text/csv"})
let url=URL.createObjectURL(blob)

let a=document.createElement("a")
a.href=url
a.download="deliveries.csv"
a.click()

}

document.getElementById("gas").addEventListener("input",render)

render()

</script>

</body>
</html>
