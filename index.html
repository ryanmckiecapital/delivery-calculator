<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Delivery Earnings Tracker</title>

<style>

:root{
--bg:#0f172a;
--card:#1e293b;
--border:#334155;
--text:#f8fafc;
--green:#22c55e;
--red:#ef4444;
--blue:#3b82f6;
--cash:#16a34a;
}

*{
box-sizing:border-box;
}

body{
margin:0;
padding:16px;
background:var(--bg);
color:var(--text);
font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto;
}

.container{
max-width:520px;
margin:auto;
display:flex;
flex-direction:column;
gap:16px;
}

.card{
background:var(--card);
padding:18px;
border-radius:14px;
border:1px solid var(--border);
}

h2,h3{
margin-top:0;
}

.stat{
display:flex;
justify-content:space-between;
margin:6px 0;
}

.total{
font-size:20px;
font-weight:bold;
margin-top:10px;
}

input,select{
width:100%;
padding:12px;
margin-top:6px;
border-radius:10px;
border:1px solid var(--border);
background:#020617;
color:white;
font-size:16px;
}

button{
margin-top:12px;
width:100%;
padding:14px;
border:none;
border-radius:10px;
background:var(--blue);
color:white;
font-size:16px;
font-weight:bold;
}

.delivery{
display:flex;
justify-content:space-between;
padding:10px 0;
border-bottom:1px solid var(--border);
}

.badge{
padding:4px 8px;
border-radius:6px;
font-size:11px;
font-weight:bold;
}

.cardbadge{background:var(--blue)}
.cashbadge{background:var(--cash)}

.green{color:var(--green)}
.red{color:var(--red)}

.chart{
display:flex;
align-items:flex-end;
gap:6px;
height:140px;
margin-top:10px;
}

.bar{
flex:1;
background:#3b82f6;
border-radius:4px 4px 0 0;
position:relative;
}

.bar span{
position:absolute;
bottom:-18px;
left:50%;
transform:translateX(-50%);
font-size:10px;
}

</style>
</head>

<body>

<div class="container">

<div class="card">

<h2>Driver Dashboard</h2>

<div class="stat">
<span>Company Payout</span>
<span>$<span id="companyPayout">0</span></span>
</div>

<div class="stat">
<span>Card Earnings</span>
<span>$<span id="cardTotal">0</span></span>
</div>

<div class="stat">
<span>Cash Earnings</span>
<span>$<span id="cashTotal">0</span></span>
</div>

<div class="stat">
<span>Tips</span>
<span>$<span id="tipsTotal">0</span></span>
</div>

<div class="stat">
<span>Gas</span>
<span>$ <input id="gas" type="number" value="0"></span>
</div>

<div class="stat">
<span>Profit After Gas</span>
<span>$<span id="profit">0</span></span>
</div>

<div class="total">
Total Earnings: $<span id="grandTotal">0</span>
</div>

</div>

<div class="card">

<h3>Add Delivery</h3>

<label>Date</label>
<input id="date" type="date">

<label>Type</label>
<select id="type">
<option value="card">Card</option>
<option value="cash">Cash</option>
</select>

<label>Delivery Fee</label>
<input id="fee" type="number">

<label>Tip</label>
<input id="tip" type="number">

<label>Service Fee</label>
<input id="service" type="number">

<button onclick="addDelivery()">Add Delivery</button>

</div>

<div class="card">

<h3>Daily Earnings</h3>
<div id="chart" class="chart"></div>

</div>

<div class="card">

<h3>Delivery History</h3>
<div id="history"></div>

</div>

</div>

<script>

let deliveries=[]

function addDelivery(){

let date=document.getElementById("date").value
let type=document.getElementById("type").value
let fee=parseFloat(document.getElementById("fee").value)||0
let tip=parseFloat(document.getElementById("tip").value)||0
let service=parseFloat(document.getElementById("service").value)||0

let driverEarn=0
let companyCut=fee*0.20

if(type==="card"){

driverEarn=(fee-companyCut)+tip

}else{

driverEarn=(fee-companyCut)-service+tip

}

deliveries.push({
date,
type,
fee,
tip,
service,
driverEarn,
companyCut
})

document.getElementById("fee").value=""
document.getElementById("tip").value=""
document.getElementById("service").value=""

render()

}

function render(){

let cardTotal=0
let cashTotal=0
let tips=0

let cashCompanyCuts=0
let cashServiceFees=0

let history=document.getElementById("history")
history.innerHTML=""

let daily={}

deliveries.forEach((d,i)=>{

history.innerHTML+=`
<div class="delivery">
<div>
<span class="badge ${d.type==="cash"?"cashbadge":"cardbadge"}">${d.type}</span>
<strong>$${d.driverEarn.toFixed(2)}</strong>
<br>
<small>${d.date}</small>
</div>
<button onclick="removeDelivery(${i})">Delete</button>
</div>
`

tips+=d.tip

if(d.type==="card"){

cardTotal+=d.driverEarn

}else{

cashTotal+=d.driverEarn
cashCompanyCuts+=d.companyCut
cashServiceFees+=d.service

}

if(!daily[d.date]) daily[d.date]=0
daily[d.date]+=d.driverEarn

})

let companyPayout=cardTotal-(cashCompanyCuts+cashServiceFees)

let grand=cardTotal+cashTotal

let gas=parseFloat(document.getElementById("gas").value)||0

let profit=grand-gas

document.getElementById("cardTotal").innerText=cardTotal.toFixed(2)
document.getElementById("cashTotal").innerText=cashTotal.toFixed(2)
document.getElementById("tipsTotal").innerText=tips.toFixed(2)
document.getElementById("companyPayout").innerText=companyPayout.toFixed(2)
document.getElementById("grandTotal").innerText=grand.toFixed(2)

let profitEl=document.getElementById("profit")
profitEl.innerText=profit.toFixed(2)
profitEl.className=profit>=0?"green":"red"

let chart=document.getElementById("chart")
chart.innerHTML=""

let max=Math.max(...Object.values(daily),10)

Object.entries(daily).slice(-7).forEach(([date,total])=>{

let height=(total/max)*120

chart.innerHTML+=`
<div class="bar" style="height:${height}px">
<span>${new Date(date).getDate()}</span>
</div>
`

})

}

function removeDelivery(i){

deliveries.splice(i,1)
render()

}

document.getElementById("gas").addEventListener("input",render)

</script>

</body>
</html>
