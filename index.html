<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Driver Earnings Tracker</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

:root{
--bg:#121212;
--card:#1e1e1e;
--border:#2a2a2a;
--text:#f2f2f2;
--accent:#3b82f6;
--green:#22c55e;
--red:#ef4444;
--cash:#16a34a;
--cardblue:#2563eb;
}

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto;
background:var(--bg);
color:var(--text);
padding:15px;
}

.container{
max-width:520px;
margin:auto;
display:flex;
flex-direction:column;
gap:16px;
}

.card{
background:var(--card);
border-radius:16px;
padding:18px;
border:1px solid var(--border);
width:100%;
box-sizing:border-box;
}

h1,h3{
margin-top:0;
}

.stat{
display:flex;
justify-content:space-between;
margin:6px 0;
}

.total{
font-size:20px;
font-weight:bold;
margin-top:10px;
}

input,select{
width:100%;
max-width:100%;
padding:12px;
border-radius:10px;
border:1px solid var(--border);
margin-top:6px;
background:#111;
color:white;
box-sizing:border-box;
}

input[type="date"]{
appearance:none;
-webkit-appearance:none;
width:100%;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:12px;
margin-top:10px;
background:linear-gradient(45deg,#4f9cff,#2563eb);
color:white;
font-weight:bold;
font-size:15px;
}

.delivery{
border-bottom:1px solid var(--border);
padding:12px 0;
display:flex;
justify-content:space-between;
align-items:center;
}

.badge{
padding:4px 8px;
border-radius:6px;
font-size:11px;
font-weight:bold;
}

.cash{background:var(--cash)}
.cardbadge{background:var(--cardblue)}

.historyButtons{
display:flex;
gap:6px;
}

.historyButtons button{
width:auto;
padding:6px 10px;
}

.pagination{
display:flex;
justify-content:center;
align-items:center;
gap:10px;
margin-top:10px;
}

.pagebtn{
width:auto;
padding:6px 10px;
}

.profitGreen{color:var(--green);font-weight:bold;}
.profitRed{color:var(--red);font-weight:bold;}

.dashboard{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-bottom:10px;
}

.dashboard div{
background:#111;
padding:10px;
border-radius:10px;
text-align:center;
}

</style>
</head>

<body>

<div class="container">

<div class="card">

<h1>Driver Dashboard</h1>

<div class="dashboard">

<div>
Today<br>
<strong id="today">0</strong>
</div>

<div>
This Week<br>
<strong id="week">0</strong>
</div>

<div>
Company Payout<br>
<strong id="companyPayout">0</strong>
</div>

<div>
Deliveries<br>
<strong id="deliveries">0</strong>
</div>

</div>

<div class="stat"><span>Card Earnings</span><span>$<span id="cardTotal">0</span></span></div>

<div class="stat"><span>Cash Earnings</span><span>$<span id="cashTotal">0</span></span></div>

<div class="stat"><span>Tips</span><span>$<span id="tipsTotal">0</span></span></div>

<div class="stat"><span>Gas</span><span>$ <input id="gas" type="number" value="0"></span></div>

<div class="stat"><span>Profit After Gas</span><span>$<span id="profit">0</span></span></div>

<div class="total">Total Earnings: $<span id="grandTotal">0</span></div>

</div>


<div class="card">

<label>Date</label>
<input id="date" type="date">

<label>Delivery Type</label>
<select id="type">
<option value="card">Card Delivery</option>
<option value="cash">Cash Delivery</option>
</select>

<label>Delivery Fee</label>
<input id="deliveryFee" type="number">

<label>Tip</label>
<input id="tip" type="number">

<label>Service Fee (cash only)</label>
<input id="serviceFee" type="number">

<button onclick="addDelivery()">Add Delivery</button>

</div>


<div class="card">

<h3>Earnings Chart</h3>

<canvas id="chart"></canvas>

</div>


<div class="card">

<h3>Delivery History</h3>

<div id="history"></div>

<div class="pagination">

<button class="pagebtn" onclick="prevPage()">⬅</button>

<span id="pageInfo"></span>

<button class="pagebtn" onclick="nextPage()">➡</button>

</div>

</div>

</div>

<script>

let deliveries=[]
let db
let currentPage=1
const perPage=10

let request=indexedDB.open("driverDB",1)

request.onupgradeneeded=e=>{
db=e.target.result
db.createObjectStore("deliveries",{keyPath:"id",autoIncrement:true})
}

request.onsuccess=e=>{
db=e.target.result
loadData()
}

function loadData(){

let tx=db.transaction("deliveries","readonly")
let store=tx.objectStore("deliveries")

store.getAll().onsuccess=e=>{
deliveries=e.target.result
render()
}

}

function saveDelivery(data){

let tx=db.transaction("deliveries","readwrite")
tx.objectStore("deliveries").add(data)
tx.oncomplete=loadData

}

function addDelivery(){

let date=document.getElementById("date").value
let type=document.getElementById("type").value
let fee=parseFloat(document.getElementById("deliveryFee").value)||0
let tip=parseFloat(document.getElementById("tip").value)||0
let service=parseFloat(document.getElementById("serviceFee").value)||0

let companyCut=fee*0.20
let earning=(fee-companyCut)+tip

if(type==="cash") earning-=service

saveDelivery({date,type,fee,tip,service,earning})

document.getElementById("deliveryFee").value=""
document.getElementById("tip").value=""
document.getElementById("serviceFee").value=""

document.getElementById("deliveryFee").focus()

}

function deleteDelivery(id){

let tx=db.transaction("deliveries","readwrite")
tx.objectStore("deliveries").delete(id)
tx.oncomplete=loadData

}

function render(){

let start=(currentPage-1)*perPage
let page=deliveries.slice(start,start+perPage)

let history=document.getElementById("history")
history.innerHTML=""

let cardTotal=0
let cashTotal=0
let tipsTotal=0
let serviceTotal=0

let today=0
let week=0

let daily={}

let now=new Date()
let weekStart=new Date()
weekStart.setDate(now.getDate()-7)

page.forEach(d=>{

let badge=d.type==="cash"?"cash":"cardbadge"
let label=d.type==="cash"?"CASH":"CARD"

history.innerHTML+=`

<div class="delivery">

<div>

<span class="badge ${badge}">${label}</span>

<strong>$${d.earning.toFixed(2)}</strong>

<br>

<small>${d.date}</small>

</div>

<div class="historyButtons">

<button onclick="deleteDelivery(${d.id})">Delete</button>

</div>

</div>

`

})

deliveries.forEach(d=>{

if(d.type==="card") cardTotal+=d.earning
else{
cashTotal+=d.earning
serviceTotal+=d.service
}

tipsTotal+=d.tip

if(!daily[d.date]) daily[d.date]=0
daily[d.date]+=d.earning

let dDate=new Date(d.date)

if(d.date===now.toISOString().slice(0,10)) today+=d.earning

if(dDate>=weekStart) week+=d.earning

})

let companyPayout=cardTotal-serviceTotal
let grand=cardTotal+cashTotal
let gas=parseFloat(document.getElementById("gas").value)||0
let profit=grand-gas

document.getElementById("cardTotal").innerText=cardTotal.toFixed(2)
document.getElementById("cashTotal").innerText=cashTotal.toFixed(2)
document.getElementById("tipsTotal").innerText=tipsTotal.toFixed(2)
document.getElementById("grandTotal").innerText=grand.toFixed(2)

document.getElementById("today").innerText=today.toFixed(2)
document.getElementById("week").innerText=week.toFixed(2)
document.getElementById("deliveries").innerText=deliveries.length
document.getElementById("companyPayout").innerText=companyPayout.toFixed(2)

let profitEl=document.getElementById("profit")
profitEl.innerText=profit.toFixed(2)
profitEl.className=profit>=0?"profitGreen":"profitRed"

drawChart(daily)

let pages=Math.ceil(deliveries.length/perPage)||1
document.getElementById("pageInfo").innerText=`Page ${currentPage}/${pages}`

}

function nextPage(){
let pages=Math.ceil(deliveries.length/perPage)
if(currentPage<pages){
currentPage++
render()
}
}

function prevPage(){
if(currentPage>1){
currentPage--
render()
}
}

let chart

function drawChart(data){

let labels=Object.keys(data)
let values=Object.values(data)

if(chart) chart.destroy()

chart=new Chart(document.getElementById("chart"),{

type:"bar",

data:{
labels:labels,
datasets:[{label:"Daily Earnings",data:values}]
}

})

}

document.getElementById("gas").addEventListener("input",render)

</script>

</body>
</html>
